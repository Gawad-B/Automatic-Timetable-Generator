services:
  - type: web
    name: attg-backend
    env: python
    buildCommand: pip install -r requirements.txt && npm ci && npm run build
    startCommand: gunicorn -c gunicorn.conf.py wsgi:app
    autoDeploy: true
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: MAX_UPLOAD_MB
        value: "10"
